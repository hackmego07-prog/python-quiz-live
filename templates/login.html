<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Python Infinity</title>
    <style>
        :root {
            --primary: #3498db;
            --dark: #2c3e50;
            --bg: #f4f7f6;
            --white: #ffffff;
            --error: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: var(--white);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            display: block;
        }

        h2 {
            color: var(--dark);
            margin: 0 0 10px 0;
            font-size: 1.6rem;
        }

        p {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            background-color: #f9fcff;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
        }

        button:active {
            transform: scale(0.97);
        }

        .footer-note {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <span class="icon">🐍</span>
        <h2>Python Infinity</h2>
        <p>Login or Register to save your score</p>

        <form action="/login" method="POST">
            <div class="form-group">
                <label>USERNAME</label>
                <input type="text" name="username" placeholder="Enter name" required autofocus>
            </div>
            
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit">Start Quiz 🚀</button>
        </form>

        <div class="footer-note">
            Personal high scores will be saved.
        </div>
    </div>

</body>
</html>
