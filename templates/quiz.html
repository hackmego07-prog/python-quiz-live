<!DOCTYPE html>
<html>
<head>
    <title>Python Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --dark: #2c3e50; }
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        
        /* 1. This pushes the box down to clear the stats header */
        #quiz-box { 
            margin-top: 80px; 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .header { display: flex; justify-content: space-between; position: fixed; top: 0; left: 0; width: 100%; background: white; padding: 15px 20px; box-sizing: border-box; z-index: 999; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* 2. Moves trophy down so it doesn't block the score */
        #leaderboard-icon { 
            position: fixed; top: 85px; right: 15px; z-index: 1000; 
            background: white; padding: 10px; border-radius: 50%; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); cursor: pointer; font-size: 1.2rem;
        }

        .btn { display: block; width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; color: white; background: var(--primary); }
        
        /* Modal Styles */
        #rankModal { display:none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        .modal-card { margin: 15% auto; width: 90%; max-width: 350px; background: white; padding: 20px; border-radius: 15px; position: relative; }
        .leaderboard-scroll { max-height: 300px; overflow-y: auto; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="user-info">👤 {{ session['user'] }}</div>
        <div class="stats">Q: <span id="q-count">0</span>/10 | Score: <span id="score-val" style="color:var(--success)">0</span></div>
    </div>

    <div id="leaderboard-icon" onclick="openRankModal()">🏆</div>

    <div id="quiz-box">
        <div id="game-ui">
            <h3 id="question-text">Loading...</h3>
            <div id="options-container"></div>
        </div>
    </div>

    <div id="rankModal">
        <div class="modal-card">
            <span onclick="closeRankModal()" style="position: absolute; right: 15px; top: 10px; font-size: 25px; cursor: pointer;">&times;</span>
            <h2 style="margin-top:0">Top 20 Rankers</h2>
            <div id="modal-content" class="leaderboard-scroll"></div>
        </div>
    </div>

    <script>
        let totalScore = 0;
        // Logic for opening the trophy menu
        function openRankModal() {
            document.getElementById("rankModal").style.display = "block";
            fetch('/api/leaderboard').then(res => res.json()).then(data => {
                let table = '<table style="width:100%">';
                data.forEach((p, i) => {
                    table += `<tr><td>#${i+1}</td><td>${p[0]}</td><td style="text-align:right"><b>${p[1]}</b></td></tr>`;
                });
                document.getElementById("modal-content").innerHTML = table + '</table>';
            });
        }
        function closeRankModal() { document.getElementById("rankModal").style.display = "none"; }

        // 3. Perfect center alignment for the finish screen
        function finishQuiz() {
            document.getElementById('quiz-box').innerHTML = `
                <div style="text-align: center;">
                    <h1>Quiz Finished!</h1>
                    <p>You earned ⚡</p>
                    <div style="font-size: 3rem; color: var(--success); font-weight: bold; margin: 10px 0;">+ ${totalScore} Points</div>
                    <button onclick="window.location.href='/leaderboard'" class="btn" style="background: var(--success);">View Global Rankings 🏆</button>
                    <button onclick="location.reload()" class="btn">Try 10 New Questions 🔄</button>
                </div>`;
        }
    </script>
</body>
</html>
