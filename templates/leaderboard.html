<!DOCTYPE html>
<html>
<head>
    <title>Global Rankings - Kai.pycourse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        
        .card { 
            background: white; padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; 
            max-width: 400px; text-align: center; margin-top: 20px;
        }

        h1 { color: var(--dark); margin-bottom: 25px; font-size: 1.8rem; }

        .leaderboard-scroll { 
            max-height: 450px; overflow-y: auto; margin-bottom: 20px; 
            border-radius: 10px; background: #fff;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 12px; color: #7f8c8d; font-size: 0.85rem; text-transform: uppercase; border-bottom: 2px solid #f4f7f6; }
        td { padding: 15px 12px; border-bottom: 1px solid #f4f7f6; font-size: 1rem; }

        .rank-col { font-weight: bold; color: var(--primary); width: 50px; }
        .score-col { text-align: right; font-weight: bold; color: var(--success); }

        /* Perfect Centering for the Button */
        .btn { 
            display: block; width: 100%; max-width: 280px; 
            margin: 20px auto 0; padding: 16px; 
            background: var(--primary); color: white; 
            text-decoration: none; border-radius: 12px; 
            font-weight: bold; transition: 0.3s; 
        }
        
        .btn:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏆 Top 20 Players</h1>
        
        <div class="leaderboard-scroll">
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th style="text-align:right">Score</th>
                    </tr>
                </thead>
                <tbody>
                    {% for name, score in rankers %}
                    <tr>
                        <td class="rank-col">#{{ loop.index }}</td>
                        <td style="color: var(--dark);">{{ name }}</td>
                        <td class="score-col">{{ score }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <a href="/quiz" class="btn">Play Again 🔄</a>
    </div>
</body>
</html>
