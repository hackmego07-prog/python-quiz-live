<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        
        /* 4. The Scrollable Window */
        .leaderboard-scroll { max-height: 450px; overflow-y: auto; margin-top: 20px; padding-right: 5px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        
        /* 5. Center the button exactly */
        .btn { 
            display: block; width: 100%; max-width: 280px; 
            margin: 25px auto; padding: 15px; 
            background: #3498db; color: white; text-decoration: none; 
            border-radius: 10px; font-weight: bold; 
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏆 Global Rankings</h1>
        <div class="leaderboard-scroll">
            <table>
                <thead>
                    <tr><th>Rank</th><th>Player</th><th style="text-align:right;">Points ⚡</th></tr>
                </thead>
                <tbody>
                    {% for name, score in rankers %}
                    <tr><td>#{{ loop.index }}</td><td>{{ name }}</td><td style="text-align:right"><b>{{ score }}</b></td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <a href="/quiz" class="btn">Play Again</a>
        <a href="/logout" style="display:block; margin-top:15px; color:#95a5a6; text-decoration:none;">Logout</a>
    </div>
</body>
</html>
